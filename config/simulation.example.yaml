schema_version: '2.0'

# 本地编译示例：在 Windows 节点编译 Selena；产物定位和传输由系统处理。
# branch 留空表示编译当前工作区；填写分支时软件用隔离 worktree 切换，不污染当前工作区。
# 两个脚本都必填：前者编译 Selena；后者是代码仓的软件包编译入口，
# 软件用它识别内部适配并检查/修复所需构建依赖。
selena:
  source: build
  code_path: D:/path/to/code
  branch: ''
  selena_build_script: D:/path/to/code/jenkins_selena_build.bat   # 编译 Selena 主产物，必填
  package_build_script: D:/path/to/code/software_package_build.bat # 软件包编译入口，必填
  runtime_xml: D:/path/to/Runtime.xml                              # 与编译产物绑定的 Runtime XML，必填

# 只填写一个数据路径；软件递归发现 MF4。Cluster 无法直接访问本地路径时自动上传。
data:
  path: D:/path/to/measurements

# MatFilter 必填。Adapter 仅在所识别的仿真配方需要时检查（例如 ovrs25 可留空）。
# Web 中选择并上传后会写入可跨电脑复用的 config-asset:// 引用。
simulation:
  target: auto
  adapter_file: ''
  mat_filter: D:/path/to/signals.filter
