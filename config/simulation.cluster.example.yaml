schema_version: '2.0'

# 无 Windows 用户：填写 Linux 服务或 Cluster 可访问共享目录中的已有 Selena 文件夹。
selena:
  source: existing
  existing_path: /mnt/radar-share/selena/release-2026-07
  runtime_xml: /mnt/radar-share/selena/release-2026-07/Runtime.xml

# 始终只填写数据路径。软件会自动判断 Cluster 是否可直接访问；
# 若路径只在已连接的 Windows Agent 上可见，则自动创建上传阶段。
data:
  path: /mnt/radar-share/measurements/case-001

# MatFilter 必填；Adapter 仅在识别出的仿真配方需要时才必填。
simulation:
  target: cluster
  adapter_file: ''
  mat_filter: /mnt/radar-share/config/MatFilter.cfg
