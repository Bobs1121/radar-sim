schema_version: "2.0"

# OD25：直接使用已有 Selena 文件夹，在 Cluster 仿真。
# existing_path 选择包含 Selena.exe 及其同目录 DLL 的准确产物文件夹。
selena:
  source: existing
  existing_path: "D:/path/to/OD25_Selena/RelWithDebInfo"
  runtime_xml: "D:/path/to/OD25_Runtime.xml"
  # 以下三项不触发编译；建议填写，系统会复用本地编译识别规则交叉确认产品。
  code_path: "D:/path/to/OD25_code"
  selena_build_script: "D:/path/to/OD25_code/apl/product/selena/jenkins_selena_build.bat"
  package_build_script: "D:/path/to/OD25_code/apl/product/tools/builder/cmake_build.bat"

data:
  path: "//server/share/path/to/OD25_measurements"

simulation:
  target: cluster
  adapter_file: "D:/path/to/OD25_adapter.txt"
  mat_filter: "D:/path/to/OD25_mat.filter"
